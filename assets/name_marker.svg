      <text x="800" y="312" font-size="40" font-weight="500" fill="#a6a7ab">агенты, автоматизация</text>
      <text x="800" y="354" font-size="28" font-weight="400" font-style="italic" fill="#8b8e95">agents &amp; automation</text>
    </g>
