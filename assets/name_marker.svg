<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" width="1600" height="420" role="img" aria-label="network-user · Python developer" font-family="Inter, Segoe UI, Arial, sans-serif">
  <title>network-user · Python developer</title>
  <desc>Hand-drawn marker over a faint graph-paper grid: highlighter swipe sweeps under the name, name reveals, bilingual role phrases (RU + EN subtitle) cycle below.</desc>
  <defs>
    <linearGradient id="s3bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0d0f"/><stop offset="0.5" stop-color="#131418"/><stop offset="1" stop-color="#07080a"/>
    </linearGradient>
    <radialGradient id="s3glow" cx="48%" cy="30%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="s3grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 L 0 40" fill="none" stroke="#ffffff" stroke-width="1"/>
    </pattern>
    <clipPath id="s3wipe"><rect x="330" y="120" width="0" height="150"><animate attributeName="width" from="0" to="940" dur="1.4s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.2 1" keyTimes="0;1"/></rect></clipPath>
  </defs>
  <rect width="1600" height="420" fill="url(#s3bg)"/>
  <rect width="1600" height="420" fill="url(#s3grid)" opacity="0"><animate attributeName="opacity" from="0" to="0.05" dur="1.3s" begin="0.2s" fill="freeze"/></rect>
  <g stroke="#ffffff" stroke-width="1" opacity="0"><path d="M0 140 H1600 M0 280 H1600 M400 0 V420 M800 0 V420 M1200 0 V420"/><animate attributeName="opacity" from="0" to="0.06" dur="1.3s" begin="0.2s" fill="freeze"/></g>
  <rect width="1600" height="420" fill="url(#s3glow)"/>
  <text x="800" y="92" text-anchor="middle" font-size="28" font-weight="600" letter-spacing="10" fill="#9a9ca2" opacity="0">bio<animate attributeName="opacity" from="0" to="0.95" dur="0.9s" begin="0.4s" fill="freeze"/></text>
  <path d="M 420 196 C 700 188, 1040 188, 1180 198 C 1222 202, 1130 210, 985 208" fill="none" stroke="#f3f3f1" stroke-opacity="0.16" stroke-width="60" stroke-linecap="round" stroke-dasharray="1760" stroke-dashoffset="1760"><animate attributeName="stroke-dashoffset" from="1760" to="0" dur="1.2s" begin="0.3s" fill="freeze"/></path>
  <g clip-path="url(#s3wipe)"><text x="800" y="216" text-anchor="middle" font-size="96" font-weight="800" fill="#f3f3f1">network-user</text></g>
